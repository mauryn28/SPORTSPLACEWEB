<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Contact Us - Sports Place Kenya</title>

    <!-- BOOTSTRAP CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CUSTOM CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">

        <a class="navbar-brand"
            href="index.html">

            <img src="images/logo.png"
                alt="Logo"
                width="60">

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                        href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="about.html">
                        About Us
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="services.html">
                        Products/Services
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="gallery.html">
                        Gallery
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                        href="contact.html">
                        Contact Us
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="register.html">
                        Register
                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <!-- CONTACT SECTION -->

    <section class="container py-5 mt-5">

        <h1 class="text-center mb-5">
            Contact Us
        </h1>

        <div class="row">

            <!-- CONTACT DETAILS -->

            <div class="col-md-6">

                <div class="card shadow p-4">

                    <h3 class="mb-4">
                        Get In Touch
                    </h3>

                    <p>
                        <strong>Phone:</strong><br>
                        0792590091
                    </p>

                    <p>
                        <strong>Email:</strong><br>
                        info@sportsplace.co.ke
                    </p>

                    <p>
                        <strong>Location:</strong><br>
                        Platinum Plaza Shop B18,
                        Tom Mboya Street,
                        Opposite Imenti House,
                        Nairobi, Kenya.
                    </p>

                </div>

            </div>

            <!-- CONTACT FORM -->

            <div class="col-md-6">

                <div class="card shadow p-4">

                    <h3 class="mb-4">
                        Send Us A Message
                    </h3>

                    <form>

                        <div class="mb-3">

                            <input type="text"
                                class="form-control"
                                placeholder="Your Name">

                        </div>

                        <div class="mb-3">

                            <input type="email"
                                class="form-control"
                                placeholder="Your Email">

                        </div>

                        <div class="mb-3">

                            <textarea class="form-control"
                                rows="5"
                                placeholder="Your Message"></textarea>

                        </div>

                        <button class="btn btn-dark w-100">
                            Send Message
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
