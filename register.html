<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register - Sports Place Kenya</title>

    <!-- BOOTSTRAP CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CUSTOM CSS -->

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">

        <a class="navbar-brand"
            href="index.html">

            <img src="images/logo.png"
                alt="Logo"
                width="60">

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                        href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="about.html">
                        About Us
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="services.html">
                        Products/Services
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="gallery.html">
                        Gallery
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="contact.html">
                        Contact Us
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                        href="register.html">
                        Register
                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <!-- REGISTER SECTION -->

    <section class="container py-5 mt-5">

        <div class="row justify-content-center">

            <div class="col-md-7">

                <div class="card shadow p-5">

                    <h1 class="text-center mb-4">
                        Customer Registration
                    </h1>

                    <form action="#"
                        method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input type="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input type="tel"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Gender
                            </label>

                            <select class="form-select">

                                <option>
                                    Male
                                </option>

                                <option>
                                    Female
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Favorite Product Category
                            </label>

                            <select class="form-select">

                                <option>
                                    Football Boots
                                </option>

                                <option>
                                    Jerseys & Sportswear
                                </option>

                                <option>
                                    Gym & Fitness
                                </option>

                                <option>
                                    Sports Accessories
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                class="form-control"
                                required>

                        </div>

                        <button type="submit"
                            class="btn btn-dark w-100">

                            Register

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
